<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ride Support</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
               background: #f5f5f5; display: flex; justify-content: center;
               align-items: center; min-height: 100vh; }
        .app { width: 420px; background: #fff; border-radius: 16px;
               box-shadow: 0 4px 24px rgba(0,0,0,0.1); overflow: hidden;
               display: flex; flex-direction: column; height: 600px; }
        .header { background: #0f3460; color: #fff; padding: 16px 20px;
                   display: flex; align-items: center; gap: 12px; }
        .header h2 { font-size: 16px; font-weight: 500; }
        .header p { font-size: 12px; opacity: 0.7; }
        .role-bar { display: flex; border-bottom: 1px solid #eee; }
        .role-btn { flex: 1; padding: 10px; border: none; background: #f9f9f9;
                     cursor: pointer; font-size: 13px; color: #666;
                     transition: all 0.15s; }
        .role-btn.active { background: #fff; color: #0f3460; font-weight: 500;
                            border-bottom: 2px solid #0f3460; }
        .chat { flex: 1; overflow-y: auto; padding: 16px;
                 display: flex; flex-direction: column; gap: 10px; }
        .msg { display: flex; gap: 8px; max-width: 85%; }
        .msg.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg.ai { align-self: flex-start; }
        .avatar { width: 28px; height: 28px; border-radius: 50%; font-size: 11px;
                   font-weight: 600; display: flex; align-items: center;
                   justify-content: center; flex-shrink: 0; margin-top: 2px; }
        .ai .avatar { background: #e1f5ee; color: #0f6e56; }
        .user .avatar { background: #e6f1fb; color: #0c447c; }
        .bubble { padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.5; }
        .ai .bubble { background: #f4f4f4; border-bottom-left-radius: 3px; }
        .user .bubble { background: #0f3460; color: #fff; border-bottom-right-radius: 3px; }
        .chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 16px; }
        .chip { font-size: 12px; padding: 5px 11px; border: 1px solid #ddd;
                 border-radius: 20px; cursor: pointer; background: #f9f9f9;
                 color: #555; transition: all 0.15s; }
        .chip:hover { background: #0f3460; color: #fff; border-color: #0f3460; }
        .input-row { display: flex; gap: 8px; padding: 12px 16px;
                      border-top: 1px solid #eee; }
        .input-row input { flex: 1; padding: 10px 14px; border: 1px solid #ddd;
                            border-radius: 24px; font-size: 14px; outline: none; }
        .input-row input:focus { border-color: #0f3460; }
        .send-btn { padding: 10px 18px; background: #0f3460; color: #fff;
                     border: none; border-radius: 24px; font-size: 14px;
                     cursor: pointer; transition: opacity 0.15s; }
        .send-btn:hover { opacity: 0.85; }
        .send-btn:disabled { opacity: 0.4; cursor: default; }
        .typing { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
        .typing span { width: 7px; height: 7px; border-radius: 50%;
                        background: #aaa; animation: blink 1.2s infinite; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div>
            <h2>🚗 Ride Support</h2>
            <p>Always here to help</p>
        </div>
    </div>

    <div class="role-bar">
        <button class="role-btn active" id="btn-rider" onclick="setRole('rider')">
            👤 I'm a Rider
        </button>
        <button class="role-btn" id="btn-driver" onclick="setRole('driver')">
            🚙 I'm a Driver
        </button>
    </div>

    <div class="chat" id="chat"></div>

    <div class="chips" id="chips"></div>

    <div class="input-row">
        <input id="inp" placeholder="Type your question..." onkeydown="if(event.key==='Enter') send()" />
        <button class="send-btn" id="sendBtn" onclick="send()">Send</button>
    </div>
</div>

<script>
    const QUICK = {
      rider: ['How is my fare calculated?', 'Can I cancel my ride?', 'How do I book a ride?', 'How do I rate my driver?'],
      driver: ['How do I accept a ride?', 'How are earnings calculated?', 'Can I cancel after accepting?', 'How do I end a ride?']
    };

    let role = 'rider';
    let busy = false;

    function setRole(r) {
      role = r;
      document.getElementById('btn-rider').classList.toggle('active', r === 'rider');
      document.getElementById('btn-driver').classList.toggle('active', r === 'driver');
      document.getElementById('chat').innerHTML = '';
      renderChips();
      addMsg('ai', role === 'rider'
        ? "Hi! 👋 I'm here to help with your rides. What can I help you with?"
        : "Hi! 👋 I'm here to support you as a driver. Ask me anything!");
    }

    function renderChips() {
      document.getElementById('chips').innerHTML = QUICK[role]
        .map(q => `<button class="chip" onclick="ask('${q}')">${q}</button>`)
        .join('');
    }

    function addMsg(who, text) {
      const chat = document.getElementById('chat');
      const d = document.createElement('div');
      d.className = `msg ${who}`;
      d.innerHTML = `
        <div class="avatar">${who === 'ai' ? 'AI' : 'Me'}</div>
        <div class="bubble">${text.replace(/\n/g, '<br>')}</div>`;
      chat.appendChild(d);
      chat.scrollTop = chat.scrollHeight;
      return d;
    }

    function showTyping() {
      const chat = document.getElementById('chat');
      const d = document.createElement('div');
      d.className = 'msg ai'; d.id = 'typing';
      d.innerHTML = `<div class="avatar">AI</div>
        <div class="bubble"><div class="typing">
          <span></span><span></span><span></span>
        </div></div>`;
      chat.appendChild(d);
      chat.scrollTop = chat.scrollHeight;
    }

    function ask(q) {
      document.getElementById('inp').value = q;
      send();
    }

    async function send() {
      const inp = document.getElementById('inp');
      const q = inp.value.trim();
      if (!q || busy) return;
      inp.value = '';
      busy = true;
      document.getElementById('sendBtn').disabled = true;

      addMsg('user', q);
      showTyping();

      try {
        const res = await fetch('/support/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ role, message: q })
        });
        const data = await res.json();
        document.getElementById('typing')?.remove();
        addMsg('ai', data.reply);
      } catch (e) {
        document.getElementById('typing')?.remove();
        addMsg('ai', 'Something went wrong. Please try again.');
      }

      busy = false;
      document.getElementById('sendBtn').disabled = false;
    }

    renderChips();
    setRole('rider');
</script>
</body>
</html>
